# Generated by: flowctl init --non-interactive --network testnet --destination postgres
# This is a sample of what flowctl init generates

apiVersion: flowctl/v1
kind: Pipeline
metadata:
  name: stellar-testnet-postgres
  description: Stellar testnet data pipeline to PostgreSQL

spec:
  driver: docker

  sources:
    - id: stellar-source
      image: docker.io/withobsrvr/stellar-live-source:v1.0.0
      env:
        NETWORK: testnet
        ENABLE_FLOWCTL: "true"
        FLOWCTL_ENDPOINT: "127.0.0.1:8080"
        PORT: ":50051"
        HEALTH_PORT: "8088"

  sinks:
    - id: postgres-sink
      image: docker.io/withobsrvr/postgres-sink:v1.0.0
      inputs: ["stellar-source"]
      env:
        DATABASE_URL: "postgres://postgres:postgres@localhost:5432/stellar?sslmode=disable"
        ENABLE_FLOWCTL: "true"
        FLOWCTL_ENDPOINT: "127.0.0.1:8080"
        PORT: ":50052"
        HEALTH_PORT: "8089"
