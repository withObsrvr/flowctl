# Generated by: flowctl init --preset testnet-postgres
# This is a sample of what flowctl init generates
#
# Note: Set POSTGRES_PASSWORD environment variable before running, or the default "postgres" will be used

apiVersion: flowctl/v1
kind: Pipeline
metadata:
  name: stellar-pipeline
  description: Process stellar contract events on testnet

spec:
  driver: process

  sources:
    - id: stellar-source
      type: stellar-live-source@v1.0.0
      config:
        network_passphrase: "Test SDF Network ; September 2015"
        backend_type: RPC
        rpc_endpoint: https://soroban-testnet.stellar.org
        start_ledger: 2187805

  processors:
    - id: contract-events
      type: contract-events-processor@v1.0.0
      config:
        network_passphrase: "Test SDF Network ; September 2015"
      inputs: ["stellar-source"]

  sinks:
    - id: postgres-sink
      type: postgres-consumer@v1.0.0
      config:
        postgres_host: localhost
        postgres_port: "5432"
        postgres_db: stellar_events
        postgres_user: postgres
        postgres_password: "postgres"
      inputs: ["contract-events"]
